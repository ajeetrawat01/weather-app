<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/style.css">
    <title>WeatherApp</title>
</head>
<body>
    <div class="container">
       
        <div class="weather-container">
            
            <!-- temperture -->
            <div class="temp">
                <p>20 </p>
            </div>  
            <!-- location -->
            <div class="location-time">
                <p>Indore</p>
                <span>10:00 - Sunday 2026-04-19 </span>
            </div>
            <!-- condition -->
            <div class="condition">
                <img src="" alt="">
                <p>Mist</p>
            </div>

        </div>
         <!-- search bar -->
        <footer>
        <form>
            <input class="search-area" type="text" placeholder="Search for a location">
            <button type="submit">Search</button>
        </form>
    </footer>
    </div>
    
</body>
<script src="script.js"></script>
</html>
